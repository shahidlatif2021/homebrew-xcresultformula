name: Deployment Dispatcher (Copy)

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  actions: write
  checks: read
  statuses: read

jobs:
  dispatch:
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == '.deploy-copy'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-copy-pr-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Echo before dispatching downstream workflow
        run: |
          echo "About to dispatch testflight-dev-build-copy.yml for PR #${{ github.event.issue.number }}"

      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Dispatch testflight-dev-build-copy
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const branch = pr.data.head.ref;
            console.log(`PR head branch: ${branch}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'testflight-dev-build-copy.yml',
              ref: branch,
              inputs: { bump_type: 'Minor' }
            });
            console.log('Dispatched testflight-dev-build-copy.yml as GitHub App');

      - name: Echo dispatcher done
        run: echo "Deployment Dispatcher (Copy) finished"
